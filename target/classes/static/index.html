<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Weather | Interactive Forecast App</title>
    <!-- Google Fonts: Inter & Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons for Premium UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="weather-sunny">
    <!-- Background Canvas for Weather Animations (Rain, Snow, Clouds, Sunrays) -->
    <canvas id="weather-canvas"></canvas>
    
    <!-- Ambient Light Effects -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <main class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i data-lucide="cloud-lightning" class="logo-icon"></i>
                <h1>Nimbus<span>Weather</span></h1>
            </div>
            
            <!-- Unit Toggle -->
            <div class="unit-toggle-container">
                <span class="unit-label">°C</span>
                <label class="switch">
                    <input type="checkbox" id="unit-toggle">
                    <span class="slider round"></span>
                </label>
                <span class="unit-label">°F</span>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <form id="search-form" class="search-bar">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="city-input" placeholder="Search city..." autocomplete="off" required>
                <button type="submit" class="search-btn">
                    <span class="btn-text">Search</span>
                    <i data-lucide="arrow-right" class="btn-icon"></i>
                </button>
            </form>

            <!-- Quick Search Tags -->
            <div class="quick-tags">
                <button class="tag-btn" data-city="London">London</button>
                <button class="tag-btn" data-city="New York">New York</button>
                <button class="tag-btn" data-city="Tokyo">Tokyo</button>
                <button class="tag-btn" data-city="Mumbai">Mumbai</button>
                <button class="tag-btn" data-city="Paris">Paris</button>
                <button class="tag-btn" data-city="Sydney">Sydney</button>
            </div>
        </section>

        <!-- Error Container -->
        <div id="error-card" class="error-card hidden">
            <i data-lucide="alert-circle" class="error-icon"></i>
            <span id="error-message">City not found. Please try again!</span>
            <button id="error-close-btn" class="error-close">&times;</button>
        </div>

        <!-- Dashboard Grid (Initially hidden or skeleton state, JS will populate) -->
        <section id="weather-dashboard" class="dashboard-grid fade-in">
            
            <!-- Main Current Weather Card -->
            <div class="main-card glass-panel">
                <div class="main-card-header">
                    <div class="city-info">
                        <h2 id="city-name">London</h2>
                        <span id="country-badge" class="country-badge">GB</span>
                    </div>
                    <div class="date-info">
                        <p id="current-date">Thursday, June 18</p>
                    </div>
                </div>

                <div class="main-card-body">
                    <div class="temp-display">
                        <span id="main-temp" class="temp-val">24</span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <div class="condition-display">
                        <div class="weather-icon-wrapper" id="weather-icon-container">
                            <i data-lucide="sun" class="weather-main-icon text-sunny"></i>
                        </div>
                        <p id="weather-desc">Clear sky</p>
                    </div>
                </div>
            </div>

            <!-- Parameters Grid (Details Card) -->
            <div class="details-panel glass-panel">
                <h3>Weather Details</h3>
                <div class="details-grid">
                    
                    <!-- Wind -->
                    <div class="detail-item">
                        <div class="detail-icon-wrapper">
                            <i data-lucide="wind" class="detail-icon"></i>
                        </div>
                        <div class="detail-info">
                            <span class="detail-label">Wind</span>
                            <span class="detail-value" id="wind-speed">12.5 km/h</span>
                            <div class="wind-direction-container">
                                <i data-lucide="navigation" id="wind-arrow" class="wind-arrow"></i>
                                <span id="wind-deg">180°</span>
                            </div>
                        </div>
                    </div>

                    <!-- Humidity -->
                    <div class="detail-item">
                        <div class="detail-icon-wrapper">
                            <i data-lucide="droplet" class="detail-icon"></i>
                        </div>
                        <div class="detail-info">
                            <span class="detail-label">Humidity</span>
                            <span class="detail-value" id="humidity-val">65%</span>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" id="humidity-bar" style="width: 65%;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Pressure -->
                    <div class="detail-item">
                        <div class="detail-icon-wrapper">
                            <i data-lucide="gauge" class="detail-icon"></i>
                        </div>
                        <div class="detail-info">
                            <span class="detail-label">Pressure</span>
                            <span class="detail-value" id="pressure-val">1013 hPa</span>
                        </div>
                    </div>

                    <!-- Coordinates -->
                    <div class="detail-item">
                        <div class="detail-icon-wrapper">
                            <i data-lucide="map-pin" class="detail-icon"></i>
                        </div>
                        <div class="detail-info">
                            <span class="detail-label">Coordinates</span>
                            <span class="detail-value coord-text" id="coords-val">51.51°N, 0.12°W</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast Section -->
            <div class="forecast-panel glass-panel">
                <h3>5-Day Forecast</h3>
                <div class="forecast-cards" id="forecast-container">
                    <!-- Cards populated by JS -->
                    <div class="forecast-card-skeleton"></div>
                    <div class="forecast-card-skeleton"></div>
                    <div class="forecast-card-skeleton"></div>
                    <div class="forecast-card-skeleton"></div>
                    <div class="forecast-card-skeleton"></div>
                </div>
            </div>
        </section>

        <!-- Loading Spinner overlay -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="spinner">
                <div class="double-bounce1"></div>
                <div class="double-bounce2"></div>
            </div>
            <p>Fetching weather forecast...</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <p>&copy; 2026 Nimbus Weather App. Powered by Open-Meteo.</p>
    </footer>

    <!-- App JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
